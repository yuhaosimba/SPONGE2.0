[workspace]
name = "SPONGE"
version = "2.0.0-alpha"
description = "Simulation Package Toward Next GEneration of molecular modelling"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "win-64", "osx-arm64"]
preview = ["pixi-build"]
conda-pypi-map = { conda-forge = "scripts/conda-pypi-map.json" }

[environments]
cpu = ["cpu"]
cpu-mpi = ["cpu-mpi", "cpu"]
hip = ["hip"]
cuda12 = ["cuda", "cuda12"]
cuda13 = ["cuda", "cuda13"]
dev-cpu = ["dev", "cpu"]
dev-cpu-mpi = ["dev", "cpu-mpi", "cpu"]
dev-hip = ["dev", "hip"]
dev-cuda12 = ["dev", "cuda", "cuda12"]
dev-cuda13 = ["dev", "cuda", "cuda13"]
ref-gen = ["ref-gen"]

[feature.cuda.target.linux-64.dependencies]
cmake = ">=3.24"
ninja = "*"
libcufft-dev = "*"
libcublas-dev = "*"
libcusolver-dev = "*"
libcurand-dev = "*"
cuda-nvrtc-dev = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
tomlplusplus = "*"

[feature.cuda.target.win-64.dependencies]
cmake = ">=3.24"
ninja = "*"
libcufft-dev = "*"
libcublas-dev = "*"
libcusolver-dev = "*"
libcurand-dev = "*"
cuda-nvrtc-dev = "*"
vs2022_win-64 = "*"
tomlplusplus = "*"

[feature.cuda12.target.linux-64.dependencies]
cuda-nvcc = "12.8.*"

[feature.cuda12.target.win-64.dependencies]
cuda-nvcc = "12.8.*"

[feature.cuda13.target.linux-64.dependencies]
cuda-nvcc = "13.0.*"

[feature.cuda13.target.win-64.dependencies]
cuda-nvcc = "13.0.*"

[feature.hip.target.linux-64.dependencies]
cmake = ">=3.24,<4"
ninja = "*"
tomlplusplus = "*"

[feature.cpu.dependencies]
zlib = "*"

[feature.cpu.target.linux-64.dependencies]
cmake = ">=3.24"
ninja = "*"
mkl-devel = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
tomlplusplus = "*"
llvmdev = ">=22.1.0,<23"
clangdev = "22.1.*"

[feature.cpu.target.linux-aarch64.dependencies]
cmake = ">=3.24"
ninja = "*"
openblas = "*"
fftw = "*"
liblapacke = "*"
gcc_linux-aarch64 = "11.*"
gxx_linux-aarch64 = "11.*"
tomlplusplus = "*"
llvmdev = ">=22.1.0,<23"
clangdev = "22.1.*"

[feature.cpu.target.win-64.dependencies]
cmake = ">=3.24"
ninja = "*"
mkl-devel = "*"
vs2022_win-64 = "*"
tomlplusplus = "*"
llvmdev = ">=22.1.0,<23"
clangdev = "22.1.*"

[feature.cpu.target.osx-arm64.dependencies]
cmake = ">=3.24"
ninja = "*"
openblas = "*"
fftw = "*"
liblapacke = "*"
clang = "22.1.*"
clangxx = "22.1.*"
tomlplusplus = "*"
llvmdev = ">=22.1.0,<23"
clangdev = "22.1.*"

[feature.cpu-mpi.target.linux-64.dependencies]
openmpi = "5.*"

[feature.cpu-mpi.target.linux-aarch64.dependencies]
openmpi = "5.*"

[feature.dev.dependencies]
git = "*"
clang-format = "==22.1.0"
cmake-format = "==0.6.13"
ruff = "==0.15.1"
python = ">=3.9"
pip = "*"
zstandard = "*"
numpy = "*"
pytest = "*"

[feature.dev.target.linux-64.dependencies]
patchelf = "*"

[feature.dev.target.linux-aarch64.dependencies]
patchelf = "*"

[feature.dev.pypi-dependencies]
xponge = "*"
ase = "*"
build = "*"

[feature.ref-gen.target.linux-64.dependencies]
python = ">=3.9"
numpy = "*"
ambertools = "*"
gromacs = "*"
lammps = "*"

[feature.ref-gen.target.linux-64.pypi-dependencies]
pyscf = ">=2.12.1,<3"
xponge = "*"
ase = "*"

[feature.dev.tasks]
comp-lammps = "python -X utf8 -m pytest benchmarks/comparison/tests/lammps/tests/comp_*.py -s --tb=short"
comp-pyscf = "python -X utf8 -m pytest benchmarks/comparison/tests/pyscf/tests/comp_*.py -s --tb=short"
perf-pyscf = "python -X utf8 -m pytest benchmarks/comparison/tests/pyscf/tests/perf_*.py -s --tb=short"
comp-amber = "python -X utf8 -m pytest benchmarks/comparison/tests/amber/tests/comp_*.py -s --tb=short"
comp-gromacs = "python -X utf8 -m pytest benchmarks/comparison/tests/gromacs/tests/comp_*.py -s --tb=short"
vali-thermostat = "python -X utf8 -m pytest benchmarks/validation/thermostat/tests -s --tb=short"
vali-barostat = "python -X utf8 -m pytest benchmarks/validation/barostat/tests -s --tb=short"
vali-cv = "python -X utf8 -m pytest benchmarks/validation/cv/tests -s --tb=short"
vali-misc = "python -X utf8 -m pytest benchmarks/validation/misc/tests -s --tb=short"
perf-nonortho = "python -X utf8 -m pytest benchmarks/performance/nonortho/tests -s --tb=short"
perf-amber = "python -X utf8 -m pytest benchmarks/performance/amber/tests -s --tb=short"
perf-mace = "python -X utf8 -m pytest benchmarks/performance/mace/tests/test_tip3p_mace.py -s --tb=short"
perf-reaxff = "python -X utf8 -m pytest benchmarks/performance/reaxff/tests -s --tb=short"
perf-sits = "python -X utf8 -m pytest benchmarks/performance/sits/tests -s --tb=short"
perf-sinkmeta = "python -X utf8 -m pytest benchmarks/performance/sinkmeta/tests -s --tb=short"
bench-gmx-vs-sponge = "python -X utf8 -m pytest benchmarks/performance/gmx_vs_sponge/tests/test_water160k_gpu.py -s --tb=short"
format = "GITHOOK_MODIFY=1 GITHOOK_AUTO_ADD=0 GITHOOK_ALL=1 GITHOOK_FILES= python -X utf8 scripts/pre-commit"
format-check = "GITHOOK_MODIFY=0 GITHOOK_AUTO_ADD=0 GITHOOK_ALL=1 GITHOOK_FILES= python -X utf8 scripts/pre-commit"
package = "python -X utf8 conda/build_package.py --env $PIXI_ENVIRONMENT_NAME --output-dir conda/outputs"
prips-build = "python -X utf8 -m build ./plugins/prips --sdist"

[target.linux-64.tasks]
configure = "cmake -S . -B build -G Ninja"
compile = { cmd = "cmake --build build --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[target.win-64.tasks]
configure = "cmake -S . -B build -G Ninja"
compile = { cmd = "cmake --build build --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }
install-msvc = "powershell -ExecutionPolicy Bypass -File scripts/install-msvc.ps1"

[feature.cpu.target.linux-64.tasks]
configure = { cmd = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='{{ parallel }}' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\" -DCMAKE_CXX_COMPILER=\"$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++\"", args = [{ arg = "parallel", default = "none" }] }
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cpu.target.linux-aarch64.tasks]
configure = { cmd = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='{{ parallel }}' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\"", args = [{ arg = "parallel", default = "none" }] }
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cpu.target.win-64.tasks]
configure = { cmd = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='{{ parallel }}' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\"", args = [{ arg = "parallel", default = "none" }] }
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cpu.target.osx-arm64.tasks]
configure = { cmd = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='{{ parallel }}' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\"", args = [{ arg = "parallel", default = "none" }] }
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cpu-mpi.target.linux-64.tasks]
configure = { cmd = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='{{ parallel }}' -DMPI=ON -DMPI_CXX_COMPILER=\"$CONDA_PREFIX/bin/mpicxx\" -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\" -DCMAKE_CXX_COMPILER=\"$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++\"", args = [{ arg = "parallel", default = "none" }] }
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cpu-mpi.target.linux-aarch64.tasks]
configure = { cmd = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='{{ parallel }}' -DMPI=ON -DMPI_CXX_COMPILER=\"$CONDA_PREFIX/bin/mpicxx\" -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\"", args = [{ arg = "parallel", default = "none" }] }
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cuda.target.linux-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='cuda' -DCUDA_ARCH='all-major' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\" -DCMAKE_CXX_COMPILER=\"$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++\""
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.cuda.target.win-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='cuda' -DCUDA_ARCH='all-major' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\""
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.hip.target.linux-64.tasks]
configure = "cmake -S . -B build-$PIXI_ENVIRONMENT_NAME -G Ninja -DPARALLEL='hip' -DCMAKE_INSTALL_PREFIX=\"$CONDA_PREFIX\""
compile = { cmd = "cmake --build build-$PIXI_ENVIRONMENT_NAME --config Release --target install --parallel {{ jobs }}", args = [{ arg = "jobs", default = "4" }] }

[feature.ref-gen.target.linux-64.tasks]
ref-gen-pyscf = "python benchmarks/comparison/reference/pyscf/generate.py"
ref-check-pyscf = "python benchmarks/comparison/reference/pyscf/generate.py --check"
ref-gen-amber = "python benchmarks/comparison/reference/amber/generate.py"
ref-check-amber = "python benchmarks/comparison/reference/amber/generate.py --check"
ref-gen-gromacs = "python benchmarks/comparison/reference/gromacs/generate.py"
ref-check-gromacs = "python benchmarks/comparison/reference/gromacs/generate.py --check"
ref-gen-lammps = "python benchmarks/comparison/reference/lammps/generate.py"
ref-check-lammps = "python benchmarks/comparison/reference/lammps/generate.py --check"
