name: Package

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  package-sponge-conda:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda12
            env_name: dev-cuda12
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda13
            env_name: dev-cuda13
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14
          - feature: cuda12
            env_name: dev-cuda12
            target: win-64
            runner: windows-2022
          - feature: cuda13
            env_name: dev-cuda13
            target: win-64
            runner: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build conda package(s)
        run: |
          pixi install -e ${{ matrix.env_name }}
          pixi run -e ${{ matrix.env_name }} configure
          pixi run -e ${{ matrix.env_name }} compile
          pixi run -e ${{ matrix.env_name }} package-conda

      - name: Verify package install with pixi
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-pixi \
            --path "${package_path}" \
            --expose SPONGE \
            --force-reinstall
          command -v SPONGE
          pixi global uninstall verify-pixi || true

      - name: Verify package install with conda
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-conda-exe \
            --expose conda \
            conda \
            --force-reinstall
          conda_env_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-conda-env-XXXXXX")"
          conda create -y -p "${conda_env_dir}" "${package_path}"
          pixi global uninstall verify-conda-exe || true

      - name: Verify package install with mamba
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-mamba-exe \
            --expose mamba \
            mamba \
            --force-reinstall
          mamba_env_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-mamba-env-XXXXXX")"
          mamba_pkgs_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-mamba-pkgs-XXXXXX")"
          CONDA_PKGS_DIRS="${mamba_pkgs_dir}" \
            mamba create -y -p "${mamba_env_dir}" "${package_path}"
          pixi global uninstall verify-mamba-exe || true

      - name: Verify package install with micromamba
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(pixi run -e ${{ matrix.env_name }} python -c 'from pathlib import Path; print(sorted(Path("packaging/outputs").glob("*.conda"))[0].resolve())')"
          pixi global install --environment verify-micromamba-exe \
            --expose micromamba \
            micromamba \
            --force-reinstall
          micromamba_root_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-micromamba-root-XXXXXX")"
          micromamba_env_dir="$(mktemp -d "${RUNNER_TEMP}/sponge-micromamba-env-XXXXXX")"
          MAMBA_ROOT_PREFIX="${micromamba_root_dir}" \
            micromamba create -y -p "${micromamba_env_dir}" "${package_path}"
          pixi global uninstall verify-micromamba-exe || true

      - name: Upload conda artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sponge-${{ matrix.feature }}-${{ matrix.target }}-${{ github.run_id }}
          path: packaging/outputs/*.conda
          if-no-files-found: error

  package-prips-sdist:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false

      - name: Build PRIPS sdist
        run: |
          pixi install -e dev-cpu
          pixi run -e dev-cpu prips-build

      - name: Verify PRIPS sdist install with pip
        run: |
          pixi run -e dev-cpu pip install --force-reinstall plugins/prips/dist/*.tar.gz

      - name: Upload PRIPS sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: prips-sdist-${{ github.run_id }}
          path: plugins/prips/dist/*.tar.gz
          if-no-files-found: error
