name: Package

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  package:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: cpu
            env_name: dev-cpu
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu
            env_name: dev-cpu
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-aarch64
            runner: ubuntu-24.04-arm
          - feature: cpu-mpi
            env_name: dev-cpu-mpi
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda12
            env_name: dev-cuda12
            target: linux-64
            runner: ubuntu-22.04
          - feature: cuda13
            env_name: dev-cuda13
            target: linux-64
            runner: ubuntu-22.04
          - feature: cpu
            env_name: dev-cpu
            target: win-64
            runner: windows-2022
          - feature: cpu
            env_name: dev-cpu
            target: osx-arm64
            runner: macos-14
          - feature: cuda12
            env_name: dev-cuda12
            target: win-64
            runner: windows-2022
          - feature: cuda13
            env_name: dev-cuda13
            target: win-64
            runner: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          run-install: false

      - name: Build conda package(s)
        run: |
          pixi install -e ${{ matrix.env_name }}
          pixi run -e ${{ matrix.env_name }} configure
          pixi run -e ${{ matrix.env_name }} compile
          pixi run -e ${{ matrix.env_name }} package

      - name: Upload conda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sponge-${{ matrix.feature }}-${{ matrix.target }}-${{ github.run_id }}
          path: conda/outputs/*.conda
          if-no-files-found: error
